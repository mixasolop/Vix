<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Reservation Form</title>
  </head>
  <body>
    <h1>Reserve a table</h1>
    <form action="/reserve" method="post">
      <label>Name <input name="name" placeholder="Full name"></label>
      <label>Date <input name="date" placeholder="YYYY-MM-DD"></label>
      <label>Time <input name="time" placeholder="19:00"></label>
      <label>People <input name="people" placeholder="2"></label>
      <button type="submit">Submit reservation</button>
    </form>
  </body>
</html>
